version: '3.8'

services:
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - JWT_SECRET=docker-app-portal-jwt-secret
      - DATABASE_PATH=/data/app.db
      - PORT=3000
      - CADDYFILE_PATH=/app/caddyfile/Caddyfile
      - CADDY_CONTAINER_NAME=caddy
    volumes:
      - sqlite_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/kevin/DockerCompose/caddy/Caddyfile:/app/caddyfile/Caddyfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
