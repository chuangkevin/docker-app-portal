name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'docker-compose*.yml'
      - '.github/workflows/*.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm   # ARM64 native runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./packages/backend
          file: ./packages/backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/docker-app-portal-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./packages/frontend
          file: ./packages/frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/docker-app-portal-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "## Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ secrets.DOCKERHUB_USERNAME }}/docker-app-portal-backend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ secrets.DOCKERHUB_USERNAME }}/docker-app-portal-frontend:latest\`" >> $GITHUB_STEP_SUMMARY
